<div class="modal fade" id="issueCertModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Выдать сертификат</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form id="issueCertForm">
        <div class="modal-body">

          <input type="hidden" id="issue_cert_id">

          <div class="mb-3">
            <label class="form-label">Дата выдачи</label>
            <input type="date" class="form-control" id="issue_date">
          </div>

          <div class="mb-3">
            <label class="form-label">Клиент</label>
            <select class="form-select" id="issue_client">
              {% for client in clients %}
                <option value="{{ client.id }}">{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Комментарий</label>
            <textarea class="form-control" id="issue_note"></textarea>
          </div>

        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Выдать</button>
        </div>

      </form>

    </div>
  </div>
</div>
