<!-- app/templates/groups/_new_group_modal_body.html -->
<div class="row">
    <!-- Левая колонка: Управление правами -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Права доступа</h5>
                <div>
                    <button type="button" class="btn btn-sm btn-outline-primary me-1" id="addPermissionBtn">
                        <span>+</span>
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-danger" id="removeSelectedPermissionBtn">
                        <span>×</span>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Форма для добавления нового разрешения (скрыта по умолчанию) -->
                <form id="addPermissionForm" style="display:none;" class="mb-3">
                    <div class="row g-2">
                        <div class="col">
                            <select class="form-select" id="newResourceSelect" required>
                                <option value="">Выберите ресурс...</option>
                                {% for resource in resources %}
                                    <option value="{{ resource.id }}">{{ resource.description or resource.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col">
                            <select class="form-select" id="newPermissionTypeSelect" required>
                                <option value="">Тип доступа...</option>
                                <option value="can_view">Просмотр</option>
                                <option value="can_add">Добавление</option>
                                <option value="can_edit">Редактирование</option>
                                <option value="can_delete">Удаление</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-sm btn-success" id="saveNewPermissionBtn">Добавить</button>
                            <button type="button" class="btn btn-sm btn-secondary" id="cancelAddPermissionBtn">Отмена</button>
                        </div>
                    </div>
                </form>

                <!-- Список текущих разрешений -->
                <ul class="list-group" id="permissionsList">
                    <!-- Изначально пустой список -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Правая колонка: Список пользователей -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Пользователи</h5>
                <div>
                    <button type="button" class="btn btn-sm btn-outline-primary me-1" id="addUserBtn">
                        <span>+</span>
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-danger" id="removeSelectedUserBtn">
                        <span>×</span>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Форма для добавления нового пользователя (скрыта по умолчанию) -->
                <form id="addUserForm" style="display:none;" class="mb-3">
                    <div class="row g-2">
                        <div class="col">
                            <select class="form-select" id="newUserSelect" required>
                                <option value="">Выберите пользователя...</option>
                                {% for user in all_users %} <!-- Передайте all_users из маршрута -->
                                    <option value="{{ user.id }}">{{ user.name }}</option>
                                {% endfor %}
                            </select>
                        <div class="col-auto">
                            <button type="button" class="btn btn-sm btn-success" id="saveNewUserBtn">Добавить</button>
                            <button type="button" class="btn btn-sm btn-secondary" id="cancelAddUserBtn">Отмена</button>
                        </div>
                    </div>
                </form>

                <!-- Список пользователей в группе -->
                <ul class="list-group" id="usersList">
                    <!-- Изначально пустой список -->
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Добавим поле ввода для имени новой группы -->
<div class="mt-3">
    <label for="newGroupNameInput" class="form-label">Название новой группы *</label>
    <input type="text" class="form-control" id="newGroupNameInput" placeholder="Введите название группы" required>
</div>
